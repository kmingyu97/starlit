spring.application.name=gateway
server.port=8000

# JWT (user-service와 동일한 시크릿 키)
jwt.secret=starlit-jwt-secret-key-for-development-only

# Routing
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8001
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=stock-service
spring.cloud.gateway.routes[1].uri=http://localhost:8002
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/stocks/**

spring.cloud.gateway.routes[2].id=community-service
spring.cloud.gateway.routes[2].uri=http://localhost:8003
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/community/**
